name: CI — Analyze & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.24.5'

jobs:
  analyze:
    name: Dart Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      # C-10: إنشاء secrets.dart قبل Bootstrap
      - name: Create secrets.dart stub
        run: |
          mkdir -p packages/shared/lib/config
          printf '%s\n' \
            'class AppSecrets {' \
            '  AppSecrets._();' \
            '  static const String gasBaseUrl   = "";' \
            '  static const String gasSecretKey = "";' \
            '  static const String geminiApiKey = "";' \
            '}' \
            > packages/shared/lib/config/secrets.dart

      - name: Bootstrap
        run: melos bootstrap

      - name: Generate Code
        run: melos run generate

      - name: Analyze
        run: melos run analyze

      - name: Format Check
        run: melos run format

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Create secrets.dart stub
        run: |
          mkdir -p packages/shared/lib/config
          printf '%s\n' \
            'class AppSecrets {' \
            '  AppSecrets._();' \
            '  static const String gasBaseUrl   = "";' \
            '  static const String gasSecretKey = "";' \
            '  static const String geminiApiKey = "";' \
            '}' \
            > packages/shared/lib/config/secrets.dart

      - name: Bootstrap
        run: melos bootstrap

      - name: Generate Code
        run: melos run generate

      - name: Run Tests
        run: melos run test

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
