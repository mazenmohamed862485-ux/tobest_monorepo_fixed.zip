name: shared
description: الحزمة المشتركة بين تطبيقي TO Best و TO Best Management
version: 1.0.0

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.24.5'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ───────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5

  # ── Local Database (drift — متوافق مع Dart 3.x) ───────────────
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # ── HTTP Client ────────────────────────────────────────────────
  dio: ^5.4.3

  # ── Navigation ─────────────────────────────────────────────────
  go_router: ^14.2.0

  # ── Video ──────────────────────────────────────────────────────
  video_player: ^2.8.7

  # ── Notifications ──────────────────────────────────────────────
  flutter_local_notifications: ^17.2.2

  # ── Authentication ─────────────────────────────────────────────
  google_sign_in: ^6.2.1

  # ── AI ─────────────────────────────────────────────────────────
  google_generative_ai: ^0.4.6

  # ── Typography ─────────────────────────────────────────────────
  google_fonts: ^6.2.1

  # ── Health / Pedometer ─────────────────────────────────────────
  pedometer: ^4.0.2

  # ── Image ──────────────────────────────────────────────────────
  image_picker: ^1.1.2

  # ── Secure Storage ─────────────────────────────────────────────
  flutter_secure_storage: ^9.2.2

  # ── Connectivity ───────────────────────────────────────────────
  connectivity_plus: ^6.0.3

  # ── Cached Images ──────────────────────────────────────────────
  cached_network_image: ^3.3.1

  # ── Background Tasks ───────────────────────────────────────────
  workmanager: ^0.5.15

  # ── Device Info ────────────────────────────────────────────────
  device_info_plus: ^10.1.0

  # ── Window Manager (FLAG_SECURE حقيقي) ────────────────────────
  flutter_windowmanager: ^0.2.0+1

  # ── Utilities ──────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.0
  crypto: ^3.0.3
  shared_preferences: ^2.2.3

  # ── Permissions ────────────────────────────────────────────────
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Code Generation ────────────────────────────────────────────
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.13

flutter:
  assets:
    - assets/images/
    - assets/l10n/
    - assets/food_database.json
