name: tobest
description: "TO Best — تطبيق التدريب والتغذية للمستخدمين والمدربين"
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Shared Package ────────────────────────────────────────
  shared:
    path: ../../packages/shared

  # ── State Management ──────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5

  # ── Navigation ───────────────────────────────────────────
  go_router: ^14.2.0

  # ── Screen Protection (FLAG_SECURE) ──────────────────────
  flutter_windowmanager: ^0.2.0

  # ── Audio / Voice Messages ───────────────────────────────
  record: ^5.1.0
  audioplayers: ^6.0.0

  # ── Image ────────────────────────────────────────────────
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # ── Charts & Progress ────────────────────────────────────
  fl_chart: ^0.68.0

  # ── Pedometer (خطوات) ────────────────────────────────────
  pedometer: ^4.0.2
  permission_handler: ^11.3.0

  # ── Lottie (انيميشن) ─────────────────────────────────────
  lottie: ^3.1.0

  # ── Date & Time ──────────────────────────────────────────
  intl: ^0.19.0

  # ── Utilities ────────────────────────────────────────────
  uuid: ^4.4.0
  device_info_plus: ^10.1.0
  share_plus: ^10.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.10
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/

  # شاشة البداية
  # flutter_native_splash يُولِّد الملفات
