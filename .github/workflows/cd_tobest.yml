name: CD — TO Best APK

on:
  push:
    tags:
      - 'v*.*.*-tobest'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options: [release, debug]

env:
  FLUTTER_VERSION: '3.24.5'
  APP_DIR: apps/tobest

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      # C-10: printf بدل heredoc لتجنب مشاكل ${{ }} داخل EOF
      - name: Create Secrets File
        run: |
          mkdir -p packages/shared/lib/config
          printf 'class AppSecrets {\n  AppSecrets._();\n  static const String gasBaseUrl   = "%s";\n  static const String gasSecretKey = "%s";\n  static const String geminiApiKey = "%s";\n}\n' \
            "$GAS_BASE_URL" "$GAS_SECRET_KEY" "$GEMINI_API_KEY" \
            > packages/shared/lib/config/secrets.dart
        env:
          GAS_BASE_URL:   ${{ secrets.GAS_BASE_URL }}
          GAS_SECRET_KEY: ${{ secrets.GAS_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Bootstrap
        run: melos bootstrap

      - name: Generate Code
        run: melos run generate

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
            > ${{ env.APP_DIR }}/android/app/tobest.jks

      - name: Create key.properties
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=tobest.jks\n' \
            "$STORE_PASS" "$KEY_PASS" "$KEY_ALIAS" \
            > ${{ env.APP_DIR }}/android/key.properties
        env:
          STORE_PASS: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEY_PASS:   ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          KEY_ALIAS:  ${{ secrets.KEYSTORE_KEY_ALIAS }}

      - name: Build Release APK
        working-directory: ${{ env.APP_DIR }}
        run: |
          flutter build apk \
            --release \
            --target-platform android-arm64 \
            --build-name="${GITHUB_REF_NAME:-1.0.0}" \
            --build-number="${GITHUB_RUN_NUMBER:-1}"

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME:-v1.0.0}"
          BUILD="${GITHUB_RUN_NUMBER:-1}"
          cp ${{ env.APP_DIR }}/build/app/outputs/flutter-apk/app-release.apk \
             tobest-${VERSION}-build${BUILD}.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tobest-apk-${{ github.run_number }}
          path: tobest-*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: tobest-*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Secrets
        if: always()
        run: |
          rm -f packages/shared/lib/config/secrets.dart
          rm -f ${{ env.APP_DIR }}/android/app/tobest.jks
          rm -f ${{ env.APP_DIR }}/android/key.properties
